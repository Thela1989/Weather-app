<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width initial-scale=1.0" />
    <title>Väderprognos</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  </head>
  <body>
    <h1>Se dagens väder</h1>
    <button type="button" class="buttonPage2">väder 5 dygn</button>
    <div class="Weather-card">
      <div class="search">
        <input type="text" placeholder="Sök på stad" spellcheck="false" />
        <button class="search-button">
          <img alt="search icon" class="search-icon" src="images/search.png" />
        </button>
      </div>
      <div class="error"><p>Ogiltigt namn på stad</p></div>
      <div class="Theweather">
        <img alt="icon weather" src="images/clouds.png" class="weather-icon" />
        <h2 class="city">Göteborg</h2>
        <p class="temp">22°c</p>
        <p class="feelsLike">22°c</p>

        <div class="details">
          <div class="col">
            <img
              alt="icon humidity"
              class="icons-weather"
              src="images/humidity.png"
            />
            <div>
              <p class="humidity">50%</p>
              <p>Luftfuktighet</p>
            </div>
          </div>
          <div class="col">
            <img
              alt="weather-icon"
              class="icons-weather"
              src="images/wind-icon.png"
            />
            <div>
              <p class="wind"></p>
              <p>Vindstyrka</p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      /*URL + API KEY
      https://api.openweathermap.org/data/2.5/weather?q=stockholm&appid=1c13bdd2c187b9c28090b9415e929960&units=metric
      api key*/
      const apiKey = "1c13bdd2c187b9c28090b9415e929960";
      const apiUrl =
        "https://api.openweathermap.org/data/2.5/weather?&units=metric&q=";

      const searchBox = document.querySelector(".search input");
      const searchBtn = document.querySelector(".search button");
      const weatherIcon = document.querySelector(".weather-icon");
      /*function checkweather runs*/
      async function checkWeather(city) {
        const response = await fetch(apiUrl + city + `&appid=${apiKey}`);
        /*This runs if it is error*/
        if (response.status == 404) {
          document.querySelector(".error").style.display = "block";
          document.querySelector(".Theweather").style.display = "none";
          /*when it is not error, the function runs*/
        } else {
          let data = await response.json();

          document.querySelector(".city").innerHTML = data.name;
          document.querySelector(".temp").innerHTML =
            Math.round(data.main.temp) + " °C";
          document.querySelector(".feelsLike").innerHTML =
            "Känns som " + Math.round(data.main.feels_like) + " °C";
          data.main.humidity + "%";
          document.querySelector(".wind").innerHTML = data.wind.speed + "km/h";

          if (data.weather[0].main == "Clouds") {
            weatherIcon.src = "images/clouds.png";
          } else if (data.weather[0].main == "Clear") {
            weatherIcon.src = "images/clear-sky.png";
          } else if (data.weather[0].main == "Rain") {
            weatherIcon.src = "images/rain.png";
          } else if (data.weather[0].main == "Drizzle") {
            weatherIcon.src = "images/drizzle.png";
          } else if (data.weather[0].main == "Snow") {
            weatherIcon.src = "images/snowy.png";
          } else if (data.weather[0].main == "Thunderstorm") {
            weatherIcon.src = "images/storm.png";
          }
          document.querySelector(".Theweather").style.display = "block";
          document.querySelector(".error").style.display = "none";
        }
      }

      searchBtn.addEventListener("click", () => {
        checkWeather(searchBox.value);
      });
      /*style*/
      const Header = document.querySelector("h1");
      Header.style.color = "#009999";
      const buttonPage2 = document.querySelector(".buttonPage2");
      buttonPage2.style.color = "#009999";
      buttonPage2.style.backgrounColor = "#ebfffc";

      buttonPage2.addEventListener("mouseover", () => {
        buttonPage2.style.color = "#fff";
        buttonPage2.style.backgroundColor = "#009999";
        buttonPage2.style.cursor = "pointer";
      });
      buttonPage2.addEventListener("mouseout", () => {
        buttonPage2.style.backgroundColor = "#ebfffc";
        buttonPage2.style.color = "#009999";
      });

      buttonPage2.addEventListener("click", () => {
        window.location = "page2.html";
      });
    </script>
  </body>
</html>
